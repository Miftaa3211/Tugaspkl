<VirtualHost *:80>
    ServerAdmin admin@contoh.com
    ServerName contoh.com
    ServerAlias www.contoh.com
    DocumentRoot /home/sample
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
    <Directory /home/sample>
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted
        php_admin_value open_basedir /home/sample:/tmp
        php_admin_value upload_tmp_dir /home/sample
    </Directory>
</VirtualHost>

<VirtualHost *:443>
    ServerName contoh.com
    ServerAlias www.contoh.com
    DocumentRoot /home/sample
    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/xcodehoster.com.pem
    SSLCertificateKeyFile /etc/apache2/ssl/xcodehoster.com.key
    <Directory /home/sample>
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted
        php_admin_value open_basedir /home/sample:/tmp
        php_admin_value upload_tmp_dir /home/sample
    </Directory>
</VirtualHost>
